<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>This text is bold</p>
    <p><b>This text is bold</b></p>
    <p><strong>This text is bold</strong></p>
    <p><i>This text is bold</i></p>
    <p>This text is <mark>bold</mark></p>
    <p>This text is <del>bold</del></p>
    <p>This text is <del>bold</del> <ins>normal</ins></p>

    <p>This text is <sub>bold</sub></p>
    <p>This text is <sup>bold</sup></p>

</body>
</html>
